# 矿权日报 Agent：3 个 MCP server（streamable-http）+ agent 编排
#
# 一条命令生成简报（先在 .env 写入 DEEPSEEK_API_KEY）：
#   docker compose run --rm --build agent "给我生成一份关于 Pilbara 锂矿的今日简报"
# 简报输出到宿主机 ./briefings/。离线运行：MINERAL_OFFLINE=1 docker compose run --rm agent
#
# 安全基线：
# - 端口只绑定宿主机 loopback（127.0.0.1），不暴露到局域网；
# - server 启用 MCP 规范要求的 Host/Origin 校验，白名单仅含本服务名与 localhost
#   （MCP_ALLOWED_HOSTS，见 src/mineral_daily/common/runner.py）。
# - 端口选用 18001-18003（8001-8003 是本地开发高冲突段）。

x-server-base: &server-base
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: mineral-daily-agent:latest
  restart: unless-stopped

services:
  news-mcp:
    <<: *server-base
    command: mining-news-mcp --transport http --host 0.0.0.0 --port 18001
    ports: ["127.0.0.1:18001:18001"]
    healthcheck:
      # MCP 层探针：完成真实 initialize 握手才算就绪（比 TCP 探活更严格）
      test: ["CMD", "python", "-m", "mineral_daily.common.healthcheck", "http://127.0.0.1:18001/mcp"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 5s
    environment:
      MINERAL_OFFLINE: ${MINERAL_OFFLINE:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NEWS_FEEDS: ${NEWS_FEEDS:-}
      MCP_ALLOWED_HOSTS: news-mcp:18001

  pdf-mcp:
    <<: *server-base
    command: mineral-pdf-mcp --transport http --host 0.0.0.0 --port 18002
    ports: ["127.0.0.1:18002:18002"]
    healthcheck:
      test: ["CMD", "python", "-m", "mineral_daily.common.healthcheck", "http://127.0.0.1:18002/mcp"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 5s
    environment:
      MINERAL_OFFLINE: ${MINERAL_OFFLINE:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MCP_ALLOWED_HOSTS: pdf-mcp:18002

  price-mcp:
    <<: *server-base
    command: lme-price-mcp --transport http --host 0.0.0.0 --port 18003
    ports: ["127.0.0.1:18003:18003"]
    healthcheck:
      test: ["CMD", "python", "-m", "mineral_daily.common.healthcheck", "http://127.0.0.1:18003/mcp"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 5s
    environment:
      MINERAL_OFFLINE: ${MINERAL_OFFLINE:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MCP_ALLOWED_HOSTS: price-mcp:18003

  agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: mineral-daily-agent:latest
    profiles: ["agent"]  # 仅 docker compose run 时启动，不随 up 常驻
    entrypoint: ["mineral-daily", "--http"]
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      MINERAL_OFFLINE: ${MINERAL_OFFLINE:-}
      MCP_SERVERS: news=http://news-mcp:18001/mcp,pdf=http://pdf-mcp:18002/mcp,price=http://price-mcp:18003/mcp
    volumes:
      - ./briefings:/app/briefings
    depends_on:
      news-mcp: { condition: service_healthy }
      pdf-mcp: { condition: service_healthy }
      price-mcp: { condition: service_healthy }
