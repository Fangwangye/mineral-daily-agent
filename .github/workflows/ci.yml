name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests scripts eval
      - name: Type check (mypy)
        run: mypy src
      - name: Test + coverage（离线用例，含真实 MCP stdio E2E；network 标记用例默认跳过）
        run: pytest -q --cov --cov-report=term-missing
      - name: Eval 评分器自检（评一份打包样例 trace，离线无需 key）
        run: python eval/run_eval.py --trace eval/sample_trace.json

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit（按 requirements.lock 审计已锁依赖）
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock
